name: Test, Build and Deploy

on:
  push:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: backend
        run: pytest -v

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tests
        working-directory: frontend
        run: npm test -- --run

  build-backend:
    runs-on: ubuntu-latest
    needs: [test-backend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Verify app entrypoint exists
        run: test -f backend/app/main.py

  build-frontend:
    runs-on: ubuntu-latest
    needs: [test-frontend]
    env:
      VITE_API_URL: http://placeholder:8001
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Confirm dist/ exists
        run: test -d frontend/dist

  deploy:
    runs-on: self-hosted
    needs: [build-backend, build-frontend]
    steps:
      - name: Deploy
        run: |
          cd ~/projects/StoryVault
          git pull origin main
          docker ps -aq --filter "name=storyvault" | xargs -r docker rm -f
          docker-compose -f docker-compose.prod.yml up -d --build
